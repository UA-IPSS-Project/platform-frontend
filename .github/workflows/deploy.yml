name: Deploy Frontend to Azure VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted, ipss-vm]

    steps:
      - name: Deploy Frontend Direct on VM
        run: |
          set -euo pipefail
          # Entrar na pasta do frontend e atualizar o código
          cd /home/florinhasuser/ipss-digital/platform-frontend
          git fetch --no-tags origin
          git checkout --force "$GITHUB_SHA"
          
          # Voltar à pasta mãe e reconstruir
          cd ../platform-backend
          docker compose up -d --build
          
          # Limpeza de imagens antigas
          docker image prune -f